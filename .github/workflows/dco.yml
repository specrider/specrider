name: DCO

# Enforces the Developer Certificate of Origin: every non-merge commit in a
# pull request must carry a `Signed-off-by: Name <email>` trailer that matches
# the commit author. Add it with `git commit -s`, or set it as a repo default
# with `git config format.signoff true`. See CONTRIBUTING.md.

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    name: Check DCO sign-off
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Need full history of the PR range to inspect every commit message.
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Signed-off-by on all PR commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            # Skip merge commits (more than one parent): rev-list --parents
            # prints "<commit> <parent...>", so >2 tokens means a merge.
            if [ "$(git rev-list --parents -n 1 "$sha" | wc -w)" -gt 2 ]; then
              continue
            fi
            author_name=$(git show -s --format='%an' "$sha")
            author_email=$(git show -s --format='%ae' "$sha")
            # Exempt bot-authored commits (dependabot, etc.) - they don't sign
            # off and are trusted automation, matching the CLA allowlist.
            case "$author_name" in
              *'[bot]') echo "skip(bot)  $(git show -s --format='%h %s' "$sha")"; continue ;;
            esac
            expected="Signed-off-by: ${author_name} <${author_email}>"
            if git show -s --format='%B' "$sha" | git interpret-trailers --parse | grep -qiFx "$expected"; then
              echo "ok    $sha"
            else
              short=$(git show -s --format='%h %s' "$sha")
              echo "::error::Missing or mismatched DCO sign-off on commit ${short}"
              echo "        expected trailer: ${expected}"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "One or more commits are missing a matching Signed-off-by trailer."
            echo "Fix the most recent commit with:  git commit --amend -s"
            echo "Fix an entire branch with:        git rebase --signoff ${BASE_SHA}"
            exit 1
          fi
          echo "All commits carry a valid DCO sign-off."
