name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same branch when a new commit lands -
# the previous run's results are stale anyway.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Frontend: typecheck + Biome + coverage + build
  frontend:
    name: Frontend (tsc + biome check + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Biome check
        run: pnpm lint

      - name: Vitest coverage - all source
        run: pnpm test:coverage

      - name: Vitest coverage - components
        run: pnpm test:coverage:components

      - name: Vitest coverage - utilities
        run: pnpm test:coverage:utilities

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: frontend-coverage
          path: coverage/
          if-no-files-found: error

      - name: Vite build
        run: pnpm build

  # Rust: fmt + clippy + cargo test
  rust:
    name: Rust (fmt + clippy + test)
    # Tauri pulls in webkit2gtk on Linux, so the system deps below are
    # required even for unit tests (the build links against them).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Linux build deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libxdo-dev \
            libsoup-3.0-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --lib

  # Cross-platform cargo check
  # fmt/clippy/test stay on ubuntu in the `rust` job above. This job
  # exists to catch regressions that only surface on a different host:
  # platform-specific cfg blocks, the macOS objc2 layer, the Windows
  # dark-mode shims, and (the immediate reason this exists) the
  # `tauri-plugin-updater` integration which has macOS / Windows / Linux
  # code paths that the ubuntu-only build never exercises.
  rust-cross-check:
    name: Rust cross-platform check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Distinct cache keys per matrix host - sharing across hosts
          # produces "blob unexpected" cache hits.
          key: rust-cross-${{ matrix.os }}

      - name: cargo check
        run: cargo check --all-targets
