version: 2
updates:
  # Frontend dependencies (npm / pnpm) — root package.json
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    # Mirror pnpm-workspace.yaml `minimumReleaseAge: 10080` (7 days) so
    # Dependabot never proposes a release pnpm would refuse to install.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps

  # Rust dependencies for the Tauri backend
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
